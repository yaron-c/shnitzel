<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ מפת אטרקציות זלצבורגלנד</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Assistant', sans-serif;
            background: #f0f4f8;
            color: #1a2332;
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            background: linear-gradient(135deg, #14532d, #16a34a);
            color: #fff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(22,101,52,.3);
        }

        .topbar-title {
            font-size: 17px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-sub {
            font-size: 11px;
            opacity: .8;
            font-weight: 400;
        }

        .topbar-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .topbar-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,.18);
            border: 1px solid rgba(255,255,255,.35);
            color: #fff;
            text-decoration: none;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            transition: background .15s;
            white-space: nowrap;
        }

        .topbar-link:hover { background: rgba(255,255,255,.30); }

        /* ===== LEGEND BAR ===== */
        .legend-bar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 7px 16px;
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            flex-shrink: 0;
            font-size: 12px;
            color: #475569;
        }

        .legend-bar strong { color: #1a2332; font-weight: 700; }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,.12);
            flex-shrink: 0;
        }

        /* ===== MAP WRAPPER ===== */
        .map-wrap {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .map-wrap iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        @media (max-width: 540px) {
            .topbar { flex-direction: column; align-items: flex-start; }
            .topbar-links { justify-content: flex-start; }
            .legend-bar { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div>
            <div class="topbar-title">🗺️ מפת אטרקציות זלצבורגלנד</div>
            <div class="topbar-sub">כל האטרקציות הכלולות בכרטיס הזלצבורגלנד (SLC) — מסומנות על המפה</div>
        </div>
        <div class="topbar-links">
            <a href="austria.html" class="topbar-link">🏠 לוח הטיול</a>
            <a href="slc.html" class="topbar-link">💚 פרטי הכרטיס</a>
            <a href="optional.html" class="topbar-link">⭐ ימים אופציונליים</a>
        </div>
    </div>

    <div class="legend-bar">
        <strong>💡 שימוש:</strong>
        <span class="legend-item">לחץ על סמן לפרטים</span>
        <span class="legend-item">·</span>
        <span class="legend-item">גלול וזום לחיפוש לפי אזור</span>
        <span class="legend-item">·</span>
        <span class="legend-item">לחץ <strong>"פתח מפה גדולה"</strong> לניווט</span>
    </div>

    <div class="map-wrap">
        <iframe
            src="https://www.google.com/maps/d/embed?mid=1dSn9H_BAIN_DxVBNNvLSyAw_1WP6wi5A&hl=iw&ehbc=2E312F"
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

</body>
</html>
